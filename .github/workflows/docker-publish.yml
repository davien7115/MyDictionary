name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend build
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./MyDictionary/Dockerfile
          push: true
          tags: "${{ env.REGISTRY }}/${{ github.repository_owner }}/dictionary-backend:latest"

      # Frontend build
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./MyDictionaryApp/Dockerfile
          push: true
          tags: "${{ env.REGISTRY }}/${{ github.repository_owner }}/dictionary-frontend:latest"

      # Release the Compose file
      - name: Release the Compose file
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: docker-compose.prod.yml
          body: "Automated release with Docker Compose file."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
