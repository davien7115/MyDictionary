name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      # A Backend (API) buildelése és feltöltése
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./MyDictionaryAPI/Dockerfile
          push: true
          tags: ghcr.io/${{github.repository_owner}}/dictionary-backend:latest

      # A Frontend (Blazor) buildelése és feltöltése
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./MyDictionaryApp/Dockerfile
          push: true
          tags: ghcr.io/${{github.repository_owner}}/dictionary-frontend:latest